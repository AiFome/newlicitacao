# infra/nginx/nginx.conf

worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json application/javascript text/css;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  upstream api {
    server api:3001;
    keepalive 32;
  }

  upstream web {
    server web:3000;
    keepalive 32;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name licitabr.com.br www.licitabr.com.br;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name licitabr.com.br www.licitabr.com.br;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Rotas internas — bloqueadas externamente
    location /internal/ {
      deny all;
      return 403;
    }

    # API
    location /v1/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_cache_bypass $http_upgrade;
    }

    # Auth — limite mais restrito
    location /v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 3600;
    }

    # Swagger docs — apenas em staging
    # location /docs { proxy_pass http://api; }

    # Frontend Next.js
    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Favicon e robots
    location = /favicon.ico { proxy_pass http://web; access_log off; }
    location = /robots.txt  { proxy_pass http://web; access_log off; }
  }
}
